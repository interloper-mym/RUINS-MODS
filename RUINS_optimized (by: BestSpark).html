	<script>
		let useIframe = false;
let systemMode = false;
let currentEmbed = null;

/* Cached DOM refs */
const scrollEl    = document.querySelector('.scroll-container');
const controlsEl  = document.querySelector('.control-buttons');
const containerEl = document.querySelector('.container');

function changeEmbed(url) {
  const container = document.getElementById('viewerContainer');
  container.innerHTML = '';
  const el = document.createElement(useIframe ? 'iframe' : 'embed');
  el.src = url;
  el.className = 'embed';
  if (useIframe) el.allowFullscreen = true;
  container.appendChild(el);
  currentEmbed = el;
}

function toggleFullscreen() {
  if (currentEmbed && currentEmbed.requestFullscreen) currentEmbed.requestFullscreen();
}

function toggleMode() {
  useIframe = !useIframe;
  document.getElementById('toggleModeButton').textContent = useIframe ? 'Use embed' : 'Use iframe';
}

/* Clock */
function updateClock() {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString();
}
updateClock();
setInterval(updateClock, 1000);

/* Merged keydown handler */
document.addEventListener('keydown', function(e) {
  if (e.key === '\\') {
    window.location.href = 'https://olympia.schoology.com/home#/?_k=avjg3m';
    return;
  }

  if (e.key === '=') {
    systemMode = !systemMode;
    const embed = document.querySelector('.embed');

    if (systemMode) {
      scrollEl.style.display    = 'none';
      controlsEl.style.display  = 'none';
      containerEl.style.cssText = 'margin:0;width:100%;padding:5px';
      if (embed) embed.style.height = '95vh';
    } else {
      scrollEl.style.display    = '';
      controlsEl.style.display  = 'flex';
      containerEl.style.cssText = 'margin:20px auto;width:95%;padding:20px';
      if (embed) embed.style.height = '80vh';
    }
  }
});

/* Leave Warning */
window.addEventListener('beforeunload', function(e) {
  e.preventDefault();
  e.returnValue = '';
});

/* Time Hue */
function updateTimeHue() {
  const now = new Date();
  const minutes = now.getHours() * 60 + now.getMinutes();
  document.body.style.setProperty('--time-hue', (minutes / 1440 * 60) + 'deg');
}
updateTimeHue();
setInterval(updateTimeHue, 60000);

/* Boot Animation */
window.addEventListener('load', function() {
  const orb    = document.getElementById('bootOrb');
  const screen = document.getElementById('bootScreen');

  setTimeout(() => {
    orb.style.transition = 'all 1.2s ease';
    orb.style.opacity    = '1';
    orb.style.transform  = 'scale(6)';
  }, 200);

  setTimeout(() => {
    orb.style.transition = 'all 1.5s ease';
    orb.style.transform  = 'scale(20)';
    orb.style.boxShadow  = '0 0 150px #00ff88';
  }, 1700);

  setTimeout(() => {
    screen.style.transition = 'opacity 1.2s ease';
    screen.style.opacity    = '0';
  }, 3200);

  setTimeout(() => { screen.style.display = 'none'; }, 4500);
});
	</script>
